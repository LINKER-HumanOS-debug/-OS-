<script>
    // ・・・（中略：質問データなどはそのまま）・・・

    function showResult() {
        document.getElementById("question-screen").style.display = "none";
        document.getElementById("result-screen").style.display = "block";
        
        const rate = Math.round((totalScore / (questions.length * 100)) * 100);
        document.getElementById("final-rate").innerText = `バグ発生率：${rate}%`;
        
        const video = document.getElementById("result-video");
        const source = document.getElementById("video-source");

        // ★ここでファイル名をセット（1文字でも違うと動きません！）
        if (rate === 0) {
            source.src = "success.mp4"; 
        } else {
            source.src = "error.mp4";   
        }
        
        video.style.display = "block";
        video.load();

        // 動画の読み込みに失敗した時の保険
        video.onerror = function() {
            console.log("動画の読み込みに失敗しました。ファイル名を確認してください。");
            this.style.display = "none"; // 動画が出ない時でも、下のログは出す
        };

        // 再生実行
        video.play().catch(e => {
            console.log("再生ブロックされました", e);
        });

        const logContent = document.getElementById("log-content");
        selectedLogs.forEach((log, index) => {
            setTimeout(() => {
                const p = document.createElement("div");
                p.className = "log-item";
                p.innerText = log;
                logContent.appendChild(p);
            }, index * 200);
        });
    }

    showQuestion();
</script>
