<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人間関係OS バグ診断</title>
    <style>
        body { font-family: 'Courier New', monospace; background-color: #0d1117; color: #39ff14; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #container { width: 90%; max-width: 400px; border: 2px solid #39ff14; padding: 20px; border-radius: 10px; background: rgba(0,0,0,0.9); box-shadow: 0 0 20px rgba(57,255,20,0.3); text-align: center; }
        .q-img { width: 100%; height: 200px; object-fit: contain; margin-bottom: 15px; border: 1px solid #333; background:#000; display: block; }
        .btn { display: block; width: 100%; padding: 12px; margin: 10px 0; background: none; color: #39ff14; border: 1px solid #39ff14; border-radius: 5px; cursor: pointer; text-align: left; }
        .btn:hover { background: #39ff14; color: #000; }
        #loading { display: none; padding: 40px 0; font-size: 1.2rem; letter-spacing: 3px; }
    </style>
</head>
<body>
<div id="container">
    <div id="loading">SCANNING...</div>
    <div id="quiz-area">
        <img id="q-img" class="q-img" src="" alt="Loading Image...">
        <h2 id="q-text" style="font-size:1.1rem; line-height:1.4;"></h2>
        <div id="btn-area"></div>
    </div>
</div>
<script>
    const data = [
        { t: "Q1: 提案が却下された時のあなたの反応は？", i: "q1.png", a: [{n:"A: 身を引いて任せる", s:30}, {n:"B: 改善点を聞く", s:10}, {n:"C: 意図を確認する", s:0}] },
        { t: "Q2: 同僚が仕事で困っている時、どう声をかけますか？", i: "q2.png", a: [{n:"A: 無理やり代わる", s:30}, {n:"B: すぐに教える", s:20}, {n:"C: 手伝いを申し出る", s:0}] },
        { t: "Q3: 相手のミスに気づいた時、どう指摘しますか？", i: "q3.png", a: [{n:"A: その場で指摘する", s:20}, {n:"B: こっそり直す", s:30}, {n:"C: 感謝して指摘しない", s:0}] }
    ];

    let idx = 0; let score = 0;

    function render() {
        const q = data[idx];
        const img = document.getElementById('q-img');
        
        // 画像をセット。もし出なくても質問とボタンは必ず出す
        img.src = q.i;
        
        // 画像が出ない時の予備動作
        img.onerror = function() {
            console.log(q.i + " が見つかりません。テキストのみで進行します。");
            this.style.display = "none"; // 画像枠を消す
        };
        img.onload = function() {
            this.style.display = "block"; // 画像があれば出す
        };

        document.getElementById('q-text').innerText = q.t;
        const area = document.getElementById('btn-area');
        area.innerHTML = '';
        
        q.a.forEach(opt => {
            const b = document.createElement('button');
            b.innerText = opt.n; b.className = 'btn';
            b.onclick = () => {
                score += opt.s; idx++;
                document.getElementById('quiz-area').style.display = 'none';
                document.getElementById('loading').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('quiz-area').style.display = 'block';
                    if(idx < data.length) render(); else result();
                }, 800);
            };
            area.appendChild(b);
        });
    }

    function result() {
        let msg = score >= 70 ? "他人軸エラー: 暴走中" : score >= 30 ? "境界線エラー: 警告" : "自立OS: 正常稼働";
        document.getElementById('quiz-area').innerHTML = `<h2 style="color:#fff;">DEBUG COMPLETE</h2><p style="text-align:left;">> ERROR_SCORE: ${score}%<br>> STATUS: ${msg}</p><button class="btn" onclick="location.reload()" style="text-align:center;">RE-SCAN</button>`;
    }

    // 最初に実行
    render();
</script>
</body>
</html>
